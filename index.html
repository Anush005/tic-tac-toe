<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe AI - Meme Edition</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
  min-height: 100vh;
  margin: 0;
  padding: 10px; /* প্যাডিং কিছুটা কমানো হয়েছে মোবাইল ফ্রেন্ডলি করার জন্য */
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  margin-top: 20px;
  color: #2c3e50;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  font-size: 1.8rem;
}

p {
  font-size: 16px;
  color: #2c3e50;
  font-weight: bold;
}

/* বোর্ডকে রেসপনসিভ করা হয়েছে */
#board {
  display: grid;
  /* মোবাইলে স্ক্রিনের ৯০% জায়গা নেবে কিন্তু সর্বোচ্চ ৩৫০ পিক্সেল পর্যন্ত বড় হবে */
  grid-template-columns: repeat(3, minmax(80px, 110px)); 
  grid-gap: 10px;
  justify-content: center;
  margin: 20px auto;
  max-width: 95vw; 
}

.cell {
  /* সেলগুলোর সাইজ এখন অটোমেটিক অ্যাডজাস্ট হবে */
  aspect-ratio: 1 / 1; 
  width: 100%;
  font-size: 2.5rem;
  font-weight: bold;
  background: #ffffff;
  border: none;
  border-radius: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: all 0.2s ease;
  color: #2c3e50;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cell:hover {
  background: #f8f9fa;
  transform: translateY(-2px);
}

.cell.played {
  transform: scale(0.95);
  background: #ecf0f1;
}

.cell.winner {
  background: #f1c40f !important;
  color: white;
  animation: blink 0.5s infinite alternate;
}

@keyframes blink {
  from { transform: scale(0.95); }
  to { transform: scale(1.05); }
}

.controls {
  margin-top: 15px;
  width: 100%;
}

button, select {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2c3e50;
  color: #ffffff;
  cursor: pointer;
  transition: background 0.3s;
  margin: 5px;
}

button:hover {
  background: #34495e;
}

select {
  background: #ffffff;
  color: #2c3e50;
  border: 2px solid #2c3e50;
}

.cell.x { color: #2980b9; }
.cell.o { color: #e74c3c; }

#status {
  height: 40px;
  margin: 15px 0;
  color: #2c3e50;
  font-size: 1.5rem;
}

/* ছোট ফোনের জন্য বিশেষ অ্যাডজাস্টমেন্ট */
@media (max-width: 360px) {
  #board {
    grid-gap: 6px;
  }
  .cell {
    font-size: 2rem;
  }
}
</style>
</head>

<body>
<h1>Tic Tac Toe AI</h1>
<p>You = X | AI = O</p>

<div class="controls">
  <label for="mode">Difficulty: </label>
  <select id="mode" onchange="restart()">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="impossible" selected>Impossible</option>
  </select>
</div>

<div id="board"></div>
<h2 id="status"></h2>
<button onclick="restart()">Restart Game</button>

<audio id="winSound" src="maa ke ladle meme.mp3"></audio> 
<audio id="loseSound" src="Dramatic fart.mp3"></audio> 
<audio id="drawSound" src="Fahh.mp3"></audio> 

<script>
let board = ["","","","","","","","",""];
let gameOver = false;

const boardDiv = document.getElementById("board");
const status = document.getElementById("status");
const modeSelect = document.getElementById("mode");

function createBoard(){
  boardDiv.innerHTML="";
  for(let i=0;i<9;i++){
    let cell=document.createElement("button");
    cell.classList.add("cell");
    cell.innerText=board[i];
    if(board[i]==="X") cell.classList.add("x");
    if(board[i]==="O") cell.classList.add("o");
    cell.addEventListener("click",()=>humanMove(i));
    boardDiv.appendChild(cell);
  }
}

function playSound(id) {
  const sound = document.getElementById(id);
  if(sound) {
    sound.currentTime = 0; 
    sound.play().catch(e => console.log("Audio play failed, user interaction needed."));
  }
}

function humanMove(index){
  if(board[index]!=="" || gameOver) return;
  
  board[index]="X";
  updateBoard();
  
  let winCombo = checkWinner(board,"X");
  if(winCombo){
    status.innerText="You Win! 🎉";
    highlightWinner(winCombo);
    playSound("winSound");
    gameOver=true;
    return;
  }
  
  if(isDraw()){
    status.innerText="It's a Draw! 😐";
    playSound("drawSound");
    gameOver=true;
    return;
  }
  
  setTimeout(aiMove, 400);
}

function aiMove(){
  if(gameOver) return;

  let mode = modeSelect.value;
  let move;

  if(mode==="easy"){
    let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    move = empty[Math.floor(Math.random()*empty.length)];
  } else if(mode==="medium"){
    move = Math.random() < 0.5 ? bestMove() : randomMove();
  } else {
    move = bestMove();
  }

  board[move]="O";
  updateBoard();

  let winCombo = checkWinner(board,"O");
  if(winCombo){
    status.innerText="AI Wins! 💨";
    highlightWinner(winCombo);
    playSound("loseSound");
    gameOver=true;
    return;
  }
  
  if(isDraw()){
    status.innerText="It's a Draw! 😐";
    playSound("drawSound");
    gameOver=true;
  }
}

function randomMove() {
  let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  return empty[Math.floor(Math.random()*empty.length)];
}

function bestMove(){
  let bestScore=-Infinity;
  let move;
  for(let i=0;i<9;i++){
    if(board[i]===""){
      board[i]="O";
      let score=minimax(board,0,false,-Infinity,Infinity);
      board[i]="";
      if(score>bestScore){
        bestScore=score;
        move=i;
      }
    }
  }
  return move;
}

function minimax(board,depth,isMax,alpha,beta){
  if(checkWinner(board,"O")) return 10 - depth;
  if(checkWinner(board,"X")) return depth - 10;
  if(isDraw()) return 0;

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]="O";
        let score=minimax(board,depth+1,false,alpha,beta);
        board[i]="";
        best=Math.max(best,score);
        alpha=Math.max(alpha,best);
        if(beta<=alpha) break;
      }
    }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]="X";
        let score=minimax(board,depth+1,true,alpha,beta);
        board[i]="";
        best=Math.min(best,score);
        beta=Math.min(beta,best);
        if(beta<=alpha) break;
      }
    }
    return best;
  }
}

function checkWinner(board,player){
  const wins=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  for(let combo of wins){
    if(combo.every(index=>board[index]===player)){
      return combo;
    }
  }
  return null;
}

function highlightWinner(combo){
  const cells = document.querySelectorAll(".cell");
  combo.forEach(i=>{
    cells[i].classList.add("winner");
  });
}

function isDraw(){
  return board.every(cell=>cell!=="");
}

function updateBoard(){
  createBoard();
  // Played ক্লাস অ্যাড করার লজিক একটু সিম্পলিফাই করা হয়েছে
  board.forEach((val, i) => {
    if(val !== "") document.querySelectorAll(".cell")[i].classList.add("played");
  });
}

function restart(){
  board=["","","","","","","","",""];
  gameOver=false;
  status.innerText="";
  createBoard();
}

createBoard();
</script>
</body>
</html>
