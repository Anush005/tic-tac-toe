<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe AI</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* fresh gradient */
  min-height: 100vh;
}

h1 {
  margin-top: 30px;
  color: #2c3e50;
}

p {
  font-size: 18px;
  color: #2c3e50;
}

#board {
  display: grid;
  grid-template-columns: repeat(3, 120px);
  grid-gap: 10px;
  justify-content: center;
  margin-top: 30px;
}

.cell {
  width: 120px;
  height: 120px;
  font-size: 40px;
  background: #ffffff;
  border: 2px solid #2c3e50;
  cursor: pointer;
  transition: transform 0.3s ease, background 0.3s ease;
  color: #2c3e50; /* default text color */
}

.cell.played {
  transform: scale(1.1);
  background: #d1f2eb;
}

.cell.winner {
  background: #f1c40f;
  animation: blink 0.8s infinite alternate;
}

@keyframes blink {
  from { background: #f1c40f; }
  to { background: #f39c12; }
}

button, select {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 5px;
  background: #2c3e50;
  color: #ffffff;
  cursor: pointer;
}

button:hover, select:hover {
  background: #34495e;
}

select {
  margin-left: 10px;
  font-size: 16px;
  padding: 5px 10px;
  background: #ffffff;
  color: #2c3e50;
  border: 2px solid #2c3e50;
}

/* 🎨 Special colors for X and O */
.cell.x {
  color: #2980b9; /* Blue for X */
}

.cell.o {
  color: #e74c3c; /* Red for O */
}
</style>
</head>

<body>
<h1>Tic Tac Toe AI</h1>
<p>You = X | AI = O</p>

<!-- 🎮 Mode Selector -->
<label for="mode">Choose Difficulty: </label>
<select id="mode" onchange="restart()">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="impossible" selected>Impossible</option>
</select>

<div id="board"></div>
<h2 id="status"></h2>
<button onclick="restart()">Restart Game</button>

<!-- 🎵 Sound Effects -->
<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="loseSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="drawSound" src="https://actions.google.com/sounds/v1/cartoon/slide_whistle.ogg"></audio>

<script>
let board = ["","","","","","","","",""];
let gameOver = false;

const boardDiv = document.getElementById("board");
const status = document.getElementById("status");
const modeSelect = document.getElementById("mode");

function createBoard(){
  boardDiv.innerHTML="";
  for(let i=0;i<9;i++){
    let cell=document.createElement("button");
    cell.classList.add("cell");
    cell.innerText=board[i];
    if(board[i]==="X") cell.classList.add("x");
    if(board[i]==="O") cell.classList.add("o");
    cell.addEventListener("click",()=>humanMove(i));
    boardDiv.appendChild(cell);
  }
}

function humanMove(index){
  if(board[index]!=="" || gameOver) return;
  board[index]="X";
  updateBoard();
  document.querySelectorAll(".cell")[index].classList.add("played");

  let winCombo = checkWinner(board,"X");
  if(winCombo){
    status.innerText="You Win!";
    highlightWinner(winCombo);
    document.getElementById("winSound").play();
    gameOver=true;
    return;
  }
  if(isDraw()){
    status.innerText="Draw!";
    document.getElementById("drawSound").play();
    gameOver=true;
    return;
  }
  aiMove();
}

function aiMove(){
  let mode = modeSelect.value;
  let move;

  if(mode==="easy"){
    let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    move = empty[Math.floor(Math.random()*empty.length)];
  } else if(mode==="medium"){
    if(Math.random()<0.5){
      let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
      move = empty[Math.floor(Math.random()*empty.length)];
    } else {
      move = bestMove();
    }
  } else {
    move = bestMove();
  }

  board[move]="O";
  updateBoard();
  document.querySelectorAll(".cell")[move].classList.add("played");

  let winCombo = checkWinner(board,"O");
  if(winCombo){
    status.innerText="AI Wins!";
    highlightWinner(winCombo);
    document.getElementById("loseSound").play();
    gameOver=true;
    return;
  }
  if(isDraw()){
    status.innerText="Draw!";
    document.getElementById("drawSound").play();
    gameOver=true;
  }
}

function bestMove(){
  let bestScore=-Infinity;
  let move;
  for(let i=0;i<9;i++){
    if(board[i]===""){
      board[i]="O";
      let score=minimax(board,0,false,-Infinity,Infinity);
      board[i]="";
      if(score>bestScore){
        bestScore=score;
        move=i;
      }
    }
  }
  return move;
}

function minimax(board,depth,isMax,alpha,beta){
  if(checkWinner(board,"O")) return 1;
  if(checkWinner(board,"X")) return -1;
  if(isDraw()) return 0;

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]="O";
        let score=minimax(board,depth+1,false,alpha,beta);
        board[i]="";
        best=Math.max(best,score);
        alpha=Math.max(alpha,best);
        if(beta<=alpha) break;
      }
    }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]="X";
        let score=minimax(board,depth+1,true,alpha,beta);
        board[i]="";
        best=Math.min(best,score);
        beta=Math.min(beta,best);
        if(beta<=alpha) break;
      }
    }
    return best;
  }
}

function checkWinner(board,player){
  const wins=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  for(let combo of wins){
    if(combo.every(index=>board[index]===player)){
      return combo;
    }
  }
  return null;
}

function highlightWinner(combo){
  combo.forEach(i=>{
    document.querySelectorAll(".cell")[i].classList.add("winner");
  });
}

function isDraw(){
  return board.every(cell=>cell!=="");
}

function updateBoard(){
  createBoard();
}

function restart(){
  board=["","","","","","","","",""];
  gameOver=false;
  status.innerText="";
  createBoard();
}

createBoard();
</script>
</body>
</html>
